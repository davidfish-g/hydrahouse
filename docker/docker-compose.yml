services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydrahouse
      POSTGRES_PASSWORD: hydrahouse
      POSTGRES_DB: hydrahouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydrahouse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
