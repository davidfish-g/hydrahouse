apiVersion: v1
kind: ServiceAccount
metadata:
  name: hydrahouse-api
  namespace: hydrahouse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hydrahouse-orchestrator
  namespace: hydrahouse
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hydrahouse-orchestrator
  namespace: hydrahouse
subjects:
  - kind: ServiceAccount
    name: hydrahouse-api
    namespace: hydrahouse
roleRef:
  kind: Role
  name: hydrahouse-orchestrator
  apiGroup: rbac.authorization.k8s.io
