apiVersion: v1
kind: ConfigMap
metadata:
  name: hydrahouse-config
  namespace: hydrahouse
  labels:
    app: hydrahouse
data:
  HH_MODE: "kubernetes"
  HH_LISTEN_ADDR: "0.0.0.0:3000"
  HH_WS_BASE_URL: "wss://api.hydrahouse.io"
  HH_K8S_NAMESPACE: "hydrahouse"
  HH_HYDRA_NODE_IMAGE: "ghcr.io/cardano-scaling/hydra-node:1.2.0"
