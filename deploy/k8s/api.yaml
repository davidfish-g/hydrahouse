apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrahouse-api
  namespace: hydrahouse
  labels:
    app: hydrahouse
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydrahouse
      component: api
  template:
    metadata:
      labels:
        app: hydrahouse
        component: api
    spec:
      serviceAccountName: hydrahouse-api
      containers:
        - name: api
          image: hydrahouse/api:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: hydrahouse-config
            - secretRef:
                name: hydrahouse-env
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: protocol-params
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: protocol-params
          configMap:
            name: hydrahouse-protocol-params
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hydrahouse-protocol-params
  namespace: hydrahouse
  labels:
    app: hydrahouse
data:
  protocol-parameters.json: |
    {}
---
apiVersion: v1
kind: Service
metadata:
  name: hydrahouse-api
  namespace: hydrahouse
  labels:
    app: hydrahouse
    component: api
spec:
  selector:
    app: hydrahouse
    component: api
  ports:
    - port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hydrahouse-api
  namespace: hydrahouse
  labels:
    app: hydrahouse
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: hydrahouse-api
spec:
  ingressClassName: nginx
  rules:
    - host: api.hydrahouse.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hydrahouse-api
                port:
                  name: http
  tls:
    - hosts:
        - api.hydrahouse.io
      secretName: hydrahouse-tls
