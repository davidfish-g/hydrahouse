apiVersion: v1
kind: Secret
metadata:
  name: hydrahouse-env
  namespace: hydrahouse
  labels:
    app: hydrahouse
type: Opaque
stringData:
  DATABASE_URL: "postgres://hydrahouse:CHANGEME@hydrahouse-postgres:5432/hydrahouse"
  HH_BLOCKFROST_PROJECT_ID: "CHANGEME"
  HH_PLATFORM_WALLET_SK: "CHANGEME"
  HH_ENCRYPTION_KEY: "CHANGEME"
