apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-api-only
  namespace: hydrahouse
  labels:
    app: hydrahouse
spec:
  podSelector:
    matchLabels:
      app: hydrahouse
      component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hydrahouse
              component: api
      ports:
        - protocol: TCP
          port: 5432
