apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hydrahouse-postgres-data
  namespace: hydrahouse
  labels:
    app: hydrahouse
    component: postgres
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hydrahouse-postgres
  namespace: hydrahouse
  labels:
    app: hydrahouse
    component: postgres
spec:
  serviceName: hydrahouse-postgres
  replicas: 1
  selector:
    matchLabels:
      app: hydrahouse
      component: postgres
  template:
    metadata:
      labels:
        app: hydrahouse
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: hydrahouse
            - name: POSTGRES_USER
              value: hydrahouse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hydrahouse-env
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            exec:
              command: [pg_isready, -U, hydrahouse]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [pg_isready, -U, hydrahouse]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hydrahouse-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: hydrahouse-postgres
  namespace: hydrahouse
  labels:
    app: hydrahouse
    component: postgres
spec:
  selector:
    app: hydrahouse
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
